# Dokploy deployment compose for isp-cms-be.
#
# Deploy this as a Dokploy "Compose" application (NOT the local
# docker-compose.yml).
#
# Postgres is a Dokploy *managed* database (set DATABASE_URL in the UI).
# Redis is co-located here as the `isp-redis` service — self-contained and
# always reachable by name, so the app never depends on getting a managed
# Redis hostname right. Override REDIS_URL in the UI only if you want to
# point at an external/managed Redis instead.
#
# Four workloads:
#   - isp-redis : Redis 7 for throttler + refresh tokens + BullMQ.
#   - migrate   : one-shot `node dist/migrate.js`, applies pending Drizzle
#                 migrations then exits 0. The pipeline gate (Pilar 8).
#   - api       : the HTTP server (`dist/main.js`, port 3000). Exposed to
#                 the internet through Dokploy's Traefik.
#   - worker    : the BullMQ consumer (`dist/worker.js`). Internal only.
#
# api and worker WAIT for migrate to finish and for Redis to be healthy,
# so every deploy migrates before new code serves traffic and the app
# never boots against a dead Redis (which would crash-loop it).

# Environment shared by all three app workloads. Values come from the
# Dokploy environment settings (compose interpolates ${VAR}); the full
# list and how to generate secrets is in .env.dokploy.example.
x-app-env: &app-env
  NODE_ENV: production
  PORT: "3000"
  DATABASE_URL: ${DATABASE_URL}
  DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
  # Defaults to the co-located isp-redis service. `:-` also wins when the
  # UI leaves REDIS_URL empty, so a blank value never falls back to
  # localhost (which is what caused the earlier crash-loop).
  REDIS_URL: ${REDIS_URL:-redis://isp-redis:6379}
  JWT_SECRET: ${JWT_SECRET}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
  REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-604800}
  TWOFA_ENC_KEY: ${TWOFA_ENC_KEY}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  THROTTLER_TTL_MS: ${THROTTLER_TTL_MS:-60000}
  THROTTLER_LIMIT: ${THROTTLER_LIMIT:-100}
  # Cross-site cookie: FE (isp.astaweda.com) and BE (api.isp.astaweda.com)
  # are different origins, so the refresh cookie needs SameSite=None +
  # Secure (HTTPS is terminated by Traefik).
  CORS_ORIGINS: ${CORS_ORIGINS}
  COOKIE_SECURE: ${COOKIE_SECURE:-true}
  COOKIE_SAMESITE: ${COOKIE_SAMESITE:-none}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-isp-cms-be}
  SERVICE_VERSION: ${SERVICE_VERSION:-0.0.0}
  ROUTEROS_MODE: ${ROUTEROS_MODE:-simulation}

services:
  isp-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - isp-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - dokploy-network

  migrate:
    image: isp-cms-be:dokploy
    command: ["dist/migrate.js"]
    restart: "no"
    environment: *app-env
    networks:
      - dokploy-network

  api:
    # The image is built here and reused by migrate + worker.
    build:
      context: .
      dockerfile: Dockerfile
    image: isp-cms-be:dokploy
    restart: unless-stopped
    command: ["dist/main.js"]
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      isp-redis:
        condition: service_healthy
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.isp-cms-be.rule=Host(`api.isp.astaweda.com`)
      - traefik.http.routers.isp-cms-be.entrypoints=websecure
      - traefik.http.routers.isp-cms-be.tls.certresolver=letsencrypt
      - traefik.http.services.isp-cms-be.loadbalancer.server.port=3000

  worker:
    image: isp-cms-be:dokploy
    restart: unless-stopped
    command: ["dist/worker.js"]
    environment: *app-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      isp-redis:
        condition: service_healthy
    networks:
      - dokploy-network

# Dokploy's shared Traefik network. The managed Postgres attaches here too,
# so the app reaches it by its internal service hostname.
networks:
  dokploy-network:
    external: true

volumes:
  isp-redis-data:
