# Local development services. Mirrors the runtime dependencies the
# boilerplate is being built against. Production deployments use a
# managed Postgres (and managed Redis when added); this file is for
# local dev and integration tests only.
services:
  postgres:
    image: postgres:16-alpine
    container_name: boilerplate-nestjs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d app']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
