apiVersion: apps/v1
kind: Deployment
metadata:
  name: isp-cms-be
  labels:
    app.kubernetes.io/name: isp-cms-be
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: isp-cms-be
  template:
    metadata:
      labels:
        app.kubernetes.io/name: isp-cms-be
    spec:
      # Spread replicas across nodes so a node failure does not take
      # the whole service down.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: isp-cms-be
      # Give in-flight HTTP requests time to drain on SIGTERM.
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: REPLACE_ME_IMAGE # registry/path:<commit-sha> — never :latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: isp-cms-be-config
            - secretRef:
                name: isp-cms-be-secrets
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          # Distroless: no shell, drop all caps, read-only root fs.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            failureThreshold: 30 # 30 * 5 s = 150 s budget for cold start
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
