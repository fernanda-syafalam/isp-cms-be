# TEMPLATE ONLY — never commit a real Secret. Production values come
# from External Secrets Operator, sealed-secrets, or your CD pipeline.
#
#   stringData over data so the values stay readable in this template.
#   Generate JWT_SECRET with `openssl rand -hex 32`.
#   Generate TWOFA_ENC_KEY with `openssl rand -base64 32` (must stay a
#   32-byte key, base64-encoded — see src/config/env.schema.ts).
#
#   Only needed when PAYMENT_MODE=live (ADR-0016) — omit entirely for
#   the default PAYMENT_MODE=simulation deployment. Values come from the
#   Tripay merchant dashboard; envSchema fails startup fast if
#   PAYMENT_MODE=live and any of these four are missing.
#     TRIPAY_API_KEY: REPLACE_ME
#     TRIPAY_PRIVATE_KEY: REPLACE_ME
#     TRIPAY_MERCHANT_CODE: REPLACE_ME
#     TRIPAY_BASE_URL: https://tripay.co.id/api
apiVersion: v1
kind: Secret
metadata:
  name: isp-cms-be-secrets
type: Opaque
stringData:
  DATABASE_URL: postgres://user:password@db-host:5432/dbname
  REDIS_URL: redis://redis-host:6379
  JWT_SECRET: REPLACE_ME_WITH_32_OR_MORE_RANDOM_CHARACTERS
  TWOFA_ENC_KEY: REPLACE_ME_WITH_OUTPUT_OF_OPENSSL_RAND_BASE64_32
