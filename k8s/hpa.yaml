apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: isp-cms-be
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: isp-cms-be
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    # Scale down slowly to avoid flapping during traffic dips.
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    # Scale up quickly when load arrives.
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 4
          periodSeconds: 30
      selectPolicy: Max
